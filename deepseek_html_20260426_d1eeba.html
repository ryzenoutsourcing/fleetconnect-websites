    <script>
        // ============================================
        // 1. SUPABASE CONFIGURATIE
        // ============================================
        const SUPABASE_URL = 'https://lhikxiusnhpkfjbdbbjc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MoyW7wBJzwf-7oFEmesQTw_QvQX4JKL';
        
        let supabase = null;
        let supabaseConnected = false;
        
        // Initialize Supabase
        async function initSupabase() {
            try {
                const { createClient } = supabaseJs;
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                // Test connection
                const { data, error } = await supabase.from('bookings').select('count', { count: 'exact', head: true });
                if (!error) {
                    supabaseConnected = true;
                    console.log('Supabase connected successfully');
                } else {
                    supabaseConnected = false;
                    console.warn('Supabase connection issue:', error);
                }
            } catch (e) {
                supabaseConnected = false;
                console.error('Failed to initialize Supabase:', e);
            }
        }
        
        // ============================================
        // 2. DATA OPSLAG IN SUPABASE
        // ============================================
        let bookingsData = [];
        
        async function loadBookingsFromSupabase() {
            if (!supabase || !supabaseConnected) return;
            try {
                const { data, error } = await supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                if (data) {
                    bookingsData = data;
                }
            } catch (e) {
                console.error('Error loading bookings:', e);
            }
        }
        
        async function saveBookingToSupabase(bookingData) {
            if (!supabase || !supabaseConnected) {
                console.warn('Supabase not connected, saving to local storage');
                // Fallback to localStorage
                const localBookings = JSON.parse(localStorage.getItem('fleet_bookings') || '[]');
                localBookings.push(bookingData);
                localStorage.setItem('fleet_bookings', JSON.stringify(localBookings));
                return { data: bookingData, error: null };
            }
            
            try {
                const { data, error } = await supabase
                    .from('bookings')
                    .insert([{
                        ...bookingData,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    }])
                    .select();
                
                if (error) throw error;
                return { data, error: null };
            } catch (e) {
                console.error('Error saving booking:', e);
                // Fallback to localStorage
                const localBookings = JSON.parse(localStorage.getItem('fleet_bookings') || '[]');
                localBookings.push(bookingData);
                localStorage.setItem('fleet_bookings', JSON.stringify(localBookings));
                return { data: bookingData, error: null };
            }
        }
        
        async function updateBookingStatus(bookingId, status) {
            if (!supabase || !supabaseConnected) {
                const localBookings = JSON.parse(localStorage.getItem('fleet_bookings') || '[]');
                const index = localBookings.findIndex(b => b.id === bookingId);
                if (index !== -1) {
                    localBookings[index].status = status;
                    localStorage.setItem('fleet_bookings', JSON.stringify(localBookings));
                }
                return;
            }
            
            try {
                await supabase
                    .from('bookings')
                    .update({ status: status, updated_at: new Date().toISOString() })
                    .eq('id', bookingId);
            } catch (e) {
                console.error('Error updating booking:', e);
            }
        }

        const NOW = new Date(2026, 3, 27, 10, 30);
        
        function formatCurrentTime() {
            const dagen = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];
            const dag = dagen[NOW.getDay()];
            const datum = `${NOW.getDate().toString().padStart(2,'0')}-${(NOW.getMonth()+1).toString().padStart(2,'0')}-${NOW.getFullYear()}`;
            const tijd = `${NOW.getHours().toString().padStart(2,'0')}:${NOW.getMinutes().toString().padStart(2,'0')}`;
            return `${dag} ${datum} om ${tijd} uur`;
        }

        // ============================================
        // 4. DATUM & TIJD HELPER FUNCTIES
        // ============================================
        function parseDateTime(dateStr, timeStr) {
            const parts = dateStr.split('-');
            const timeParts = timeStr ? timeStr.split(':') : ['00', '00'];
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]), parseInt(timeParts[0]), parseInt(timeParts[1]));
        }

        function isOrderInFuture(order) {
            const orderDateTime = parseDateTime(order.datetime, order.time);
            return orderDateTime > NOW;
        }

        async function checkSupabaseConnection() {
            supabaseStatus.lastCheck = new Date();
            
            if (!supabase || !supabaseConnected) {
                supabaseStatus.connected = false;
                supabaseStatus.responseTime = 0;
                return supabaseStatus;
            }
            
            const startTime = performance.now();
            try {
                const { data, error } = await supabase.from('bookings').select('count', { count: 'exact', head: true });
                const endTime = performance.now();
                supabaseStatus.responseTime = Math.round(endTime - startTime);
                
                if (error) {
                    supabaseStatus.connected = false;
                    supabaseStatus.recentErrors.unshift({
                        timestamp: new Date(),
                        error: error.message,
                        endpoint: "/rest/v1/bookings"
                    });
                } else {
                    supabaseStatus.connected = true;
                }
            } catch (e) {
                supabaseStatus.connected = false;
                supabaseStatus.recentErrors.unshift({
                    timestamp: new Date(),
                    error: e.message,
                    endpoint: "/rest/v1/bookings"
                });

            supabaseStatus.recentErrors = supabaseStatus.recentErrors.slice(0, 10);

        function renderOrders() { document.getElementById('contentArea').innerHTML = '<div class="orders-table-wrapper"><div class="empty-planning">Orders sectie</div></div>'; }
        function renderHistory() { document.getElementById('contentArea').innerHTML = '<div class="orders-table-wrapper"><div class="empty-planning">History sectie</div></div>'; }
        function renderAgenda() { document.getElementById('contentArea').innerHTML = '<div class="calendar-container"><div class="empty-planning">Agenda sectie</div></div>'; }
        function renderDrivers() { document.getElementById('contentArea').innerHTML = '<div class="people-card"><div class="empty-planning">Drivers sectie</div></div>'; }
        function renderOnderaannemers() { document.getElementById('contentArea').innerHTML = '<div class="people-card"><div class="empty-planning">Onderaannemers sectie</div></div>'; }
        function renderFinance() { document.getElementById('contentArea').innerHTML = '<div class="stats-grid"><div class="empty-planning">Financieel dashboard</div></div>'; }
        function closeModal() {}
        function downloadCSV() {}
        function downloadJSON() {}

        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            
            document.getElementById('downloadButtons').classList.add('hidden');
            
            if (tabName === 'neworders') renderNewOrders();
            else if (tabName === 'orders') renderOrders();
            else if (tabName === 'history') renderHistory();
            else if (tabName === 'agenda') renderAgenda();
            else if (tabName === 'drivers') renderDrivers();
            else if (tabName === 'onderaannemers') renderOnderaannemers();
            else if (tabName === 'financieel') renderFinance();
            else if (tabName === 'bugfinder') renderBugFinder();
            else if (tabName === 'bugfixer') renderBugFixer();
            else if (tabName === 'supabasemonitor') renderSupabaseMonitor();
            else if (tabName === 'systemwiki') renderSystemWiki();
            
            document.getElementById('pageTitle').innerHTML = document.querySelector(`[data-tab="${tabName}"]`)?.innerHTML || tabName;
        }

        // ============================================
        // 10. INITIALISATIE
        // ============================================
        async function init() {
            await initSupabase();
            scanForBugs();
            renderBugFinder();
        }
        
        init();
    </script>
